[package]
name = "mnemosyne-arena"
version = "0.2.0"
edition = "2021"

[features]
default = []
segment-tail-guards = []
num-complex = ["dep:num-complex"]

[dependencies]
mnemosyne-core = { path = "../mnemosyne-core" }
mnemosyne-backend = { path = "../mnemosyne-backend" }
num-complex = { version = "0.4", optional = true }
themis = { git = "https://github.com/ryancinsight/themis", version = "0.5.0", default-features = false, features = ["std"] }
